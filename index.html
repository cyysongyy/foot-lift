<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Foot Lift｜垂足復原追蹤系統</title>
<meta name="theme-color" content="#0F6E56">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --teal:#1D9E75; --tl:#E1F5EE; --td:#0F6E56;
  --amb:#EF9F27; --amb-l:#FDF0DC;
  --red:#E24B4A; --red-l:#FBE6E5;
  --blue:#4E7FD6; --blue-l:#E8EEFA;
  --bg:#F7F6F2; --bg2:#EFEDE6; --card:#FFFFFF;
  --text:#20241F; --text2:#5B5F58; --text3:#93958E;
  --border:rgba(30,40,30,0.10); --radius:16px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:76px;}
.mono{font-family:'DM Mono',monospace;}
.container{max-width:520px;margin:0 auto;padding:1rem 1rem 2rem;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:15px;}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--text);}
a{color:var(--teal);}
.hidden{display:none!important;}

/* Lock screen */
.lock-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.lock-icon{font-size:38px;color:var(--teal);margin-bottom:14px;}
.lock-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.lock-brand{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;letter-spacing:1px;color:var(--teal);margin-bottom:4px;}
.lock-brand-sub{font-size:11px;color:var(--text3);letter-spacing:3px;margin-bottom:18px;}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.8;}
.lock-input{width:100%;max-width:280px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);text-align:center;font-size:18px;letter-spacing:4px;margin-bottom:12px;}
.lock-input:focus{outline:2px solid var(--teal);}
.btn{padding:12px 24px;border-radius:12px;background:var(--teal);color:#fff;font-weight:500;font-size:15px;}
.btn:active{transform:scale(0.97);}
.btn.secondary{background:var(--card);color:var(--text2);border:1px solid var(--border);}
.btn.block{width:100%;max-width:280px;}
.lock-err{color:var(--red);font-size:13px;margin-bottom:10px;min-height:18px;}
.lock-note{font-size:11px;color:var(--text3);margin-top:20px;line-height:1.8;max-width:300px;}

/* Header */
.topbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:1rem 1rem 0.5rem;max-width:520px;margin:0 auto;display:flex;align-items:center;gap:10px;}
.topbar .back{width:36px;height:36px;border-radius:10px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);}
.topbar h1{font-size:18px;font-weight:700;flex:1;}
.topbar .action{width:36px;height:36px;border-radius:10px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid var(--border);}

/* Bottom nav */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px 7px;color:var(--text3);font-size:10px;}
.tab i{font-size:20px;}
.tab.active{color:var(--teal);}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:0.9rem;}
.card-title{font-size:13px;color:var(--text3);letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.stat-row{display:flex;gap:10px;}
.stat{flex:1;background:var(--tl);border-radius:12px;padding:12px 10px;text-align:center;}
.stat .num{font-size:24px;font-weight:700;color:var(--td);}
.stat .lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem;}
.nav-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center;}
.nav-card i{font-size:26px;color:var(--teal);margin-bottom:8px;display:block;}
.nav-card .t{font-size:14px;font-weight:500;}
.nav-card .s{font-size:11px;color:var(--text3);margin-top:2px;}

.alert-banner{border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:13px;line-height:1.7;display:flex;gap:10px;align-items:flex-start;}
.alert-banner.warn{background:var(--amb-l);color:#7a5310;}
.alert-banner.danger{background:var(--red-l);color:#8a2b2a;}
.alert-banner i{font-size:18px;margin-top:1px;}

/* Timeline */
.tl-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.tl-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.tl-title{font-size:15px;font-weight:600;margin:3px 0 2px;}
.tl-hosp{font-size:12px;color:var(--teal);margin-bottom:6px;}
.tl-desc{font-size:13px;color:var(--text2);line-height:1.75;}
.tl-tag{display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;background:var(--tl);color:var(--td);margin-bottom:6px;}
.tl-concl{background:var(--bg2);border-radius:10px;padding:8px 10px;font-size:12px;margin-top:8px;color:var(--text2);}
.tl-attach{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tl-attach a{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--bg2);color:var(--text2);display:inline-flex;align-items:center;gap:4px;text-decoration:none;}
.tl-edit-row{display:flex;gap:8px;margin-top:8px;}
.tl-edit-row button{font-size:11px;color:var(--text3);}

/* Forms */
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);}
.form-input:focus{outline:1px solid var(--teal);}
textarea.form-input{min-height:70px;resize:vertical;}
.seg{display:flex;gap:6px;flex-wrap:wrap;}
.seg-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:13px;color:var(--text2);}
.seg-btn.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-row input[type=range]{flex:1;accent-color:var(--teal);}
.slider-val{width:32px;text-align:center;font-weight:700;color:var(--td);font-family:'DM Mono',monospace;}
.chk-row{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2);margin-bottom:8px;}
.file-drop{border:1.5px dashed var(--border);border-radius:12px;padding:16px;text-align:center;font-size:13px;color:var(--text3);}
.file-drop input{display:none;}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border-radius:20px;padding:4px 10px 4px 4px;font-size:12px;margin:4px 4px 0 0;}
.file-chip button{color:var(--red);font-size:14px;}

/* history table */
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.hist-date{color:var(--text3);font-family:'DM Mono',monospace;font-size:12px;}
.spark{width:100%;height:60px;margin-top:6px;}

/* AI */
.ai-box{background:var(--tl);border:1px solid rgba(15,110,86,0.18);border-radius:14px;padding:1rem;margin-bottom:1rem;}
.ai-disclaimer{font-size:11.5px;color:#3d5c52;background:rgba(255,255,255,0.55);border-radius:8px;padding:8px 10px;line-height:1.7;margin-bottom:10px;}
.ai-response{font-size:13.5px;line-height:2;white-space:pre-wrap;color:var(--text);}
.ai-thinking{color:var(--text3);font-style:italic;font-size:13px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,25,20,0.45);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:1.4rem 1.2rem calc(1.4rem + env(safe-area-inset-bottom));max-width:520px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btns .btn{flex:1;text-align:center;}
.api-tab-row{display:flex;gap:8px;margin-bottom:12px;}
.api-tab{flex:1;text-align:center;padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--bg);font-size:13px;}
.api-tab.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.key-status{font-size:10px;padding:2px 8px;border-radius:20px;margin-left:6px;}
.key-status.ok{background:#dcf3e6;color:#1d7a4c;}
.key-status.empty{background:var(--bg2);color:var(--text3);}

/* Exercise */
.ex-hero{text-align:center;padding:1.5rem 0;}
.ring-wrap{position:relative;width:150px;height:150px;margin:0 auto 14px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--bg2);stroke-width:9;}
.ring-fg{fill:none;stroke:var(--teal);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;font-family:'DM Mono',monospace;color:var(--td);}
.ex-title{font-size:20px;font-weight:700;}
.ex-badge{display:inline-block;font-size:11px;padding:3px 12px;border-radius:20px;background:var(--tl);color:var(--td);margin-top:6px;}
.ex-icon-box{width:100%;aspect-ratio:16/10;background:var(--tl);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.ex-icon-box i{font-size:56px;color:var(--td);}
.ex-inst{font-size:14px;line-height:1.9;color:var(--text2);margin-bottom:14px;}
.ex-inst strong{color:var(--td);}
.chip-row{display:flex;gap:8px;margin-bottom:14px;}
.chip{flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center;}
.chip .l{font-size:10px;color:var(--text3);}
.chip .v{font-size:15px;font-weight:700;margin-top:2px;}
.chip-adj{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:4px;}
.chip-adj button{width:26px;height:26px;border-radius:8px;background:var(--bg2);font-size:15px;}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:1rem;}
.mode-card i{font-size:34px;color:var(--teal);margin-bottom:10px;display:block;}

/* ── 週課表 schedule ── */
.sched-tabs{display:flex;gap:8px;margin-bottom:1rem;}
.sched-tabs button{flex:1;padding:10px 0;border-radius:12px;background:var(--bg2);font-size:14px;font-weight:600;color:var(--text2);border:1px solid transparent;}
.sched-tabs button.on{background:var(--tl);color:var(--td);border-color:var(--teal);}
.sched-item{display:flex;gap:12px;margin-bottom:10px;}
.sched-time{width:64px;flex:none;text-align:right;font-size:12px;font-weight:700;color:var(--text3);padding-top:14px;font-variant-numeric:tabular-nums;}
.sched-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;position:relative;}
.sched-card .em{font-size:20px;margin-right:8px;vertical-align:-2px;}
.sched-card .tx{font-size:13.5px;line-height:1.7;}
.sched-item.now .sched-card{background:var(--tl);border-color:var(--teal);}
.sched-item.now .sched-time{color:var(--teal);}
.sched-badge{position:absolute;top:-8px;right:10px;background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;animation:pulse 1.6s infinite;}
.sched-badge.next{background:var(--amb);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.sched-core{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:1.2rem;}
.sched-core summary{font-size:14px;font-weight:700;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;}
.sched-core summary::-webkit-details-marker{display:none;}
.sched-core li{font-size:13px;line-height:1.8;margin-top:10px;color:var(--text2);}
.sched-core li b{color:var(--text);}
.sched-time input{width:70px;font-size:12px;padding:3px 4px;border:1px solid var(--border);border-radius:6px;background:var(--card);margin-bottom:4px;color:var(--text);font-variant-numeric:tabular-nums;}
.sched-edit-btn.on{background:var(--tl);color:var(--td);}
.cdbtn{margin-top:8px;padding:6px 14px;border-radius:99px;background:var(--tl);color:var(--td);font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;}
.cdbtn.stop{background:var(--red-l);color:var(--red);}
.sched-cdrow{margin-top:8px;display:flex;align-items:center;gap:12px;}
.sched-cdnum{font-family:'DM Mono',ui-monospace,monospace;font-size:24px;font-weight:700;color:var(--teal);letter-spacing:1px;}
.home-readme{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-top:1.2rem;}
.home-readme summary{font-size:14px;font-weight:700;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;}
.home-readme summary::-webkit-details-marker{display:none;}
.home-readme .hr-body{margin-top:10px;font-size:13px;color:var(--text2);line-height:1.9;}
.home-readme .hr-body p{margin-bottom:12px;}
.home-readme .hr-body b{color:var(--text);}
.ex-img{border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px;background:var(--card);}
.ex-img img{width:100%;display:block;transition:opacity .4s;}
.ex-tip{background:var(--amb-l);color:#8a5a10;font-size:13px;line-height:1.7;border-radius:12px;padding:10px 14px;margin-bottom:14px;}
.ex-concept{background:#e8f5ec;border:1px solid rgba(61,122,79,.25);border-radius:14px;padding:12px 16px;margin-bottom:1rem;font-size:13px;line-height:1.8;color:#2a5637;}
.ex-concept b{display:block;margin-bottom:4px;color:#3d7a4f;}
.lift-dur{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;font-size:13px;color:var(--text2);}
.lift-dur button{width:34px;height:34px;border-radius:10px;background:var(--bg2);font-size:18px;font-weight:700;color:#b0522d;}
.lift-dur b{font-size:16px;font-variant-numeric:tabular-nums;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:13px;line-height:1.9;}
.empty i{font-size:32px;opacity:0.4;margin-bottom:10px;display:block;}
footer-note{display:block;text-align:center;font-size:11px;color:var(--text3);margin-top:1.5rem;line-height:1.9;}
</style>

<body>

<div id="app"></div>

<!-- Modal container -->
<div id="modalRoot"></div>

<script>
/* ══════════════════════════════════════════════
   IndexedDB helper
══════════════════════════════════════════════ */
const DB_NAME = 'recoveryTrackerDB';
const DB_VERSION = 2;
const STORES = ['timeline','attachments','symptomLogs','gaitLogs','exerciseLogs','kv','caseNotes'];
let _db = null;
function openDB(){
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      STORES.forEach(s => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: 'id' }); });
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e);
  });
}
async function dbGetAll(store){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly').objectStore(store).getAll();
    tx.onsuccess = () => res(tx.result || []);
    tx.onerror = rej;
  });
}
async function dbGet(store, id){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly').objectStore(store).get(id);
    tx.onsuccess = () => res(tx.result || null);
    tx.onerror = rej;
  });
}
async function dbPut(store, obj, opts){
  const db = await openDB();
  await new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite').objectStore(store).put(obj);
    tx.onsuccess = () => res(obj);
    tx.onerror = rej;
  });
  if (!(opts && opts.skipCloud)) cloudPush(store, obj);
  return obj;
}
async function dbDel(store, id, opts){
  const db = await openDB();
  await new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite').objectStore(store).delete(id);
    tx.onsuccess = () => res();
    tx.onerror = rej;
  });
  if (!(opts && opts.skipCloud)) cloudDelete(store, id);
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ══════════════════════════════════════════════
   Cloud Sync (Firebase — optional, off until 設定 saved + 登入)
   API Key／密碼雜湊等敏感設定（kv）永遠不會同步到雲端。
══════════════════════════════════════════════ */
let fbApp = null, fbAuth = null, fbDb = null, fbStorage = null, fbUser = null;
const CLOUD_STORES = ['timeline','attachments','symptomLogs','gaitLogs','exerciseLogs','caseNotes'];

function initFirebase(){
  if (fbApp) return true;
  const cfg = settings.fbConfig;
  if (!cfg || typeof firebase === 'undefined') return false;
  try{
    fbApp = firebase.apps && firebase.apps.length ? firebase.app() : firebase.initializeApp(cfg);
    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
    fbStorage = firebase.storage();
    fbAuth.onAuthStateChanged(u => { fbUser = u; if (view === 'settings') render(); });
    return true;
  }catch(e){ console.error('Firebase init failed', e); return false; }
}
async function fbSignUp(email, pw){
  if (!initFirebase()) throw new Error('請先儲存 Firebase 設定');
  await fbAuth.createUserWithEmailAndPassword(email, pw);
}
async function fbSignIn(email, pw){
  if (!initFirebase()) throw new Error('請先儲存 Firebase 設定');
  await fbAuth.signInWithEmailAndPassword(email, pw);
}
async function fbSignOut(){ if (fbAuth) await fbAuth.signOut(); }
function cloudReady(){ return !!(fbApp && fbAuth && fbAuth.currentUser); }

async function cloudPush(store, obj){
  if (!CLOUD_STORES.includes(store) || !cloudReady()) return;
  try{
    const uidc = fbAuth.currentUser.uid;
    if (store === 'attachments' && obj.dataUrl && obj.dataUrl.startsWith('data:')){
      const ref = fbStorage.ref(`users/${uidc}/attachments/${obj.id}`);
      await ref.putString(obj.dataUrl, 'data_url');
      const url = await ref.getDownloadURL();
      await fbDb.collection('users').doc(uidc).collection(store).doc(obj.id).set({ ...obj, dataUrl: url }, { merge:true });
    } else {
      await fbDb.collection('users').doc(uidc).collection(store).doc(obj.id).set(obj, { merge:true });
    }
  }catch(e){ console.error('cloudPush failed', store, e); }
}
async function cloudDelete(store, id){
  if (!CLOUD_STORES.includes(store) || !cloudReady()) return;
  try{
    const uidc = fbAuth.currentUser.uid;
    await fbDb.collection('users').doc(uidc).collection(store).doc(id).delete();
    if (store === 'attachments'){ try{ await fbStorage.ref(`users/${uidc}/attachments/${id}`).delete(); }catch(e){} }
  }catch(e){ console.error('cloudDelete failed', store, e); }
}
async function cloudPullAll(){
  if (!cloudReady()) throw new Error('請先登入雲端帳號');
  const uidc = fbAuth.currentUser.uid;
  let count = 0;
  for (const store of CLOUD_STORES){
    const snap = await fbDb.collection('users').doc(uidc).collection(store).get();
    for (const doc of snap.docs){ await dbPut(store, doc.data(), { skipCloud:true }); count++; }
  }
  return count;
}
async function cloudPushAllLocal(){
  if (!cloudReady()) throw new Error('請先登入雲端帳號');
  let count = 0;
  for (const store of CLOUD_STORES){
    const rows = await dbGetAll(store);
    for (const row of rows){ await cloudPush(store, row); count++; }
  }
  return count;
}

/* ══════════════════════════════════════════════
   Seed data — from user-provided surgical history
══════════════════════════════════════════════ */

let view = 'loading';
let viewParams = {};
let unlocked = false;
let settings = {};

async function loadSettings(){
  const rows = await dbGetAll('kv');
  settings = {};
  rows.forEach(r => settings[r.id] = r.value);
}
async function saveSetting(key, value){
  settings[key] = value;
  await dbPut('kv', { id:key, value });
}

async function ensureSeed(){
  const existing = await dbGetAll('timeline');
  if (existing.length === 0){
    for (const t of SEED_TIMELINE) await dbPut('timeline', t);
  }
}

async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function init(){
  await loadSettings();
  await ensureSeed();
  if (settings.fbConfig) initFirebase();
  if (!settings.pwHash){
    view = 'setup-password';
  } else if (localStorage.getItem('rt_unlocked') === '1'){
    unlocked = true;
    view = 'home';
  } else {
    view = 'lock';
  }
  render();
}
init();

function goto(v, params){ view = v; viewParams = params || {}; render(); window.scrollTo(0,0); }

   Render dispatcher
══════════════════════════════════════════════ */
async function render(){
  const app = document.getElementById('app');
  if (view === 'loading'){ app.innerHTML = ''; return; }
  if (view === 'setup-password'){ app.innerHTML = setupPasswordHTML(); return; }
  if (view === 'lock'){ app.innerHTML = lockHTML(); return; }

  let body = '';
  if (view === 'home') body = await homeHTML();
  else if (view === 'timeline') body = await timelineHTML();
  else if (view === 'timelineForm') body = timelineFormHTML(viewParams.id);
  else if (view === 'reports') body = await reportsHTML();
  else if (view === 'caseSummary') body = await caseSummaryHTML();
  else if (view === 'symptom') body = await symptomHTML();
  else if (view === 'symptomForm') body = symptomFormHTML();
  else if (view === 'gait') body = await gaitHTML();
  else if (view === 'gaitForm') body = gaitFormHTML();
  else if (view === 'exercise') body = exerciseHomeHTML();
  else if (view === 'exWarm') body = warmHTML();
  else if (view === 'exRehab') body = rehabHTML();
  else if (view === 'exSched') body = scheduleHTML();
  else if (view === 'exGlute') body = gluteHTML();
  else if (view === 'exLift') body = liftHTML();
  else if (view === 'ai') body = await aiHTML();
  else if (view === 'settings') body = await settingsHTML();

  app.innerHTML = `<div class="container">${body}</div>` + tabbarHTML();
  afterRender();
}

function tabbarHTML(){
  const tabs = [
    {v:'home', icon:'ti-home', label:'首頁'},
    {v:'timeline', icon:'ti-timeline', label:'病歷'},
    {v:'symptom', icon:'ti-clipboard-heart', label:'症狀'},
    {v:'exercise', icon:'ti-run', label:'運動'},
    {v:'ai', icon:'ti-sparkles', label:'AI摘要'},
    {v:'settings', icon:'ti-settings', label:'設定'},
  ];
  const isEx = ['exercise','exWarm','exRehab','exSched','exGlute','exLift'].includes(view);
  return `<div class="tabbar">${tabs.map(t => `
    <button class="tab ${ (t.v===view) || (t.v==='exercise'&&isEx) ? 'active':''}" onclick="goto('${t.v}')">
      <i class="ti ${t.icon}"></i><span>${t.label}</span>
    </button>`).join('')}</div>`;
}

function afterRender(){
  // hook for post-render listeners if needed per-view; most use inline onclick
}

  goto('home');

function daysSince(dateStr){
  const d1 = new Date(dateStr); const d2 = new Date();
  return Math.floor((d2 - d1) / 86400000);
}
async function computeAlerts(){
  const alerts = [];
  const symptomLogs = (await dbGetAll('symptomLogs')).sort((a,b)=>b.date.localeCompare(a.date));

  if (symptomLogs.length >= 6){
    const recent3 = symptomLogs.slice(0,3).reduce((s,l)=>s+(l.dorsiStrength||0),0)/3;
    const prev3 = symptomLogs.slice(3,6).reduce((s,l)=>s+(l.dorsiStrength||0),0)/3;
    if (recent3 < prev3 - 0.8){
      alerts.push({level:'warn', icon:'ti-trending-down', text:'背屈肌力自評分數近期呈現下降趨勢，建議在下次回診時特別提出討論。'});

  }
  return alerts;
}

function handleTlFiles(e){
  const files = Array.from(e.target.files);
  let remaining = files.length;
  files.forEach(f => {

function sparklineHTML(logs){
  const sorted = [...logs].sort((a,b)=>a.date.localeCompare(b.date)).slice(-20);
  const w = 460, h = 60, pad = 4;
  const step = (w - pad*2) / Math.max(sorted.length-1,1);
  const pt = (arr,key,max) => arr.map((l,i)=>`${pad+i*step},${h-pad-((l[key]||0)/max)*(h-pad*2)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pt(sorted,'dorsiStrength',5)}" fill="none" stroke="var(--teal)" stroke-width="2"/>
  </svg>
  <div style="display:flex;gap:14px;font-size:11px;color:var(--text3);margin-top:4px;">
    <span><span style="color:var(--teal);">━</span> 背屈肌力</span>
  </div>`;
}

async function saveSymptomLog(id){
  const log = {
    id, date: document.getElementById('symDate').value,
    time: document.getElementById('symTime').value,
    dorsiStrength: parseInt(document.getElementById('symDorsi').value),
    numbnessArea: document.getElementById('symNumbArea').value.trim(),
    numbnessSeverity: parseInt(document.getElementById('symNumbSev').value),
    plantarFascia: Array.from(document.querySelectorAll('#symFasciaSeg .seg-btn.on')).map(b=>b.dataset.val),
    note: document.getElementById('symNote').value.trim(),
  };
  await dbPut('symptomLogs', log);
  goto('symptom');
}

async function gaitHTML(){
  const logs = (await dbGetAll('gaitLogs')).sort((a,b)=>b.date.localeCompare(a.date));
  const now = new Date();
  const newId = uid();
  return `
    <div class="topbar" style="padding-left:0;padding-right:0;">
      <h1>功能與步態</h1>
    </div>
    <div class="card">
      <div class="form-group"><label class="form-label">日期</label><input class="form-input" type="date" id="gaitDate" value="${now.toISOString().slice(0,10)}"></div>
      <div class="form-group"><label class="chk-row"><input type="checkbox" id="gaitAFO"> 今天有使用足踝輔具（AFO／護具）</label></div>
      <div class="form-group"><label class="form-label">文字描述</label><textarea class="form-input" id="gaitNote" placeholder="今天走路、上下樓、跌倒／絆倒等狀況描述…" style="min-height:100px;"></textarea></div>
      <button class="btn" style="width:100%;" onclick="saveGaitLog('${newId}')">新增紀錄</button>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-list"></i>歷史紀錄</div>
      ${logs.length===0 ? emptyHTML('ti-walk','還沒有步態紀錄，於上方新增') : logs.map(l=>`
        <div class="tl-item">
          <div class="tl-date">${l.date}${l.usedAFO?'　・　使用 AFO／護具':''}</div>
          <div class="tl-desc">${escapeHtml(l.note||'')}</div>
          <div class="tl-edit-row"><button onclick="goto('gaitForm',{id:'${l.id}'})"><i class="ti ti-edit"></i> 編輯</button></div>
        </div>`).join('')}
    </div>
  `;
}
function gaitFormHTML(){
  return `
    <div class="topbar" style="padding-left:0;padding-right:0;">
      <button class="back" onclick="goto('gait')"><i class="ti ti-arrow-left"></i></button>
      <h1>步態紀錄</h1>
    </div>
    <div id="gaitFormBody"><div class="empty">載入中…</div></div>
  `;
}
async function renderGaitForm(id){
  const l = id ? await dbGet('gaitLogs', id) : { id:uid(), date:new Date().toISOString().slice(0,10), usedAFO:false, note:'' };
  const box = document.getElementById('gaitFormBody');
  if (!box) return;
  box.innerHTML = `
    <div class="form-group"><label class="form-label">日期</label><input class="form-input" type="date" id="gaitDate" value="${l.date}"></div>
    <div class="form-group"><label class="chk-row"><input type="checkbox" id="gaitAFO" ${l.usedAFO?'checked':''}> 今天有使用足踝輔具（AFO／護具）</label></div>
    <div class="form-group"><label class="form-label">文字描述</label><textarea class="form-input" id="gaitNote" placeholder="今天走路、上下樓、跌倒／絆倒等狀況描述…" style="min-height:100px;">${escapeHtml(l.note)}</textarea></div>
    <div class="modal-btns">
      <button class="btn secondary" onclick="goto('gait')">取消</button>
      <button class="btn" onclick="saveGaitLog('${l.id}')">儲存</button>
    </div>
  `;
}
async function saveGaitLog(id){
  const log = {
    id, date: document.getElementById('gaitDate').value,
    usedAFO: document.getElementById('gaitAFO').checked,
    note: document.getElementById('gaitNote').value.trim(),
  };
  await dbPut('gaitLogs', log);
  goto('gait');
}

function emptyHTML(icon, text){
  return `<div class="empty"><i class="ti ${icon}"></i>${text}</div>`;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

function spk(text){
  if (!voiceOn || !text) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-TW'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}

let gcur = 0, gtmr = null;

function gluteDurStr(d){ return d>=60 ? (d%60 ? Math.floor(d/60)+'分'+(d%60)+'秒' : (d/60)+'分鐘') : d+'秒'; }

function gluteHTML(){
  const ex = GLUTE_EX[gcur];
  return `
    <div class="topbar" style="padding-left:0;padding-right:0;">
      <button class="back" onclick="clearTimers();goto('exercise')"><i class="ti ti-arrow-left"></i></button>
      <h1>臀部啟動訓練 ${gcur+1}/${GLUTE_EX.length}</h1>
    </div>
    ${gcur===0 ? `<div class="ex-concept"><b>💡 今天的核心概念</b><br>右足底筋膜比左邊明顯，是因為它在<strong>代替臀部做穩定工作</strong>。目標：把穩定責任慢慢從足底<strong>還給臀部</strong>。</div>` : ''}
    <div class="ex-hero">
      <div class="ring-wrap"><div id="gluteRing">${ringSVG(0)}</div><div class="ring-num" id="gluteNum">${ex.dur}</div></div>
      <div class="ex-title">${ex.title}</div>
      <div class="ex-badge" style="background:#e8f5ec;color:#2a5637;">${ex.badge}</div>
    </div>
    <div class="ex-img"><img src="${GLUTE_IMGS[gcur]}" alt="${ex.title}"></div>
    <p class="ex-inst">${ex.desc}</p>
    <div class="ex-tip">${ex.tip}</div>
    <div class="modal-btns">
      <button class="btn secondary" onclick="gRst()">重新開始</button>
      <button class="btn" id="gluteStartBtn" style="background:#3d7a4f;" onclick="startGlute()">開始計時（${gluteDurStr(ex.dur)}）</button>
    </div>
    <div class="modal-btns" style="margin-top:8px;">
      <button class="btn secondary" onclick="ggo(${gcur-1})" ${gcur===0?'disabled':''}>← 上一個</button>
      <button class="btn secondary" onclick="ggo(${gcur+1})" ${gcur===GLUTE_EX.length-1?'disabled':''}>下一個 →</button>
    </div>
  `;
}
function ggo(i){ if(i<0||i>=GLUTE_EX.length)return; clearInterval(gtmr); gcur = i; goto('exGlute'); }
function gRst(){ clearInterval(gtmr); goto('exGlute'); }
function startGlute(){
  const ex = GLUTE_EX[gcur];
  spk(ex.vc.s);
  const btn = document.getElementById('gluteStartBtn');
  if (btn){ btn.textContent = '進行中…'; btn.disabled = true; }
  setTimeout(()=>{ if(view==='exGlute') runGluteTimer(ex); }, 1200);
}
function runGluteTimer(ex){
  let rem = ex.dur;
  const mid = Math.floor(ex.dur/2);
  clearInterval(gtmr);
  gtmr = setInterval(()=>{
    rem--;
    const numEl = document.getElementById('gluteNum');
    const ringEl = document.getElementById('gluteRing');
    if (numEl) numEl.textContent = Math.max(rem,0);
    if (ringEl) ringEl.innerHTML = ringSVG(1 - rem/ex.dur).match(/<svg[\s\S]*<\/svg>/)[0];
    if (rem === mid) spk(ex.vc.m);
    if (rem <= 0){
      clearInterval(gtmr);
      spk(ex.vc.e);
      gFinish();
    }
  },1000);
}
function gFinish(){
  if (gcur < GLUTE_EX.length - 1){
    setTimeout(()=>{ gcur++; goto('exGlute'); }, 1500);
  } else {
    dbPut('exerciseLogs', { id: uid(), date: new Date().toISOString().slice(0,10), module:'glute', label:'臀部啟動訓練（全部）' });
    goto('exercise');
  }
}

let ltmr = null, lStep = 0;

function getLiftDur(){
  try{ const s = localStorage.getItem('flDur_lift1'); if (s!==null) return parseInt(s); }catch(e){}
  return LIFT.dur;
}
function liftAdj(delta){
  const v = Math.max(20, Math.min(300, getLiftDur()+delta));
  try{ localStorage.setItem('flDur_lift1', v); }catch(e){}
  clearInterval(ltmr); lStep = 0; goto('exLift');
}
function liftHTML(){
  const dur = getLiftDur();
  const step = LIFT.steps[lStep] || LIFT.steps[0];
  return `
    <div class="topbar" style="padding-left:0;padding-right:0;">
      <button class="back" onclick="clearTimers();goto('exercise')"><i class="ti ti-arrow-left"></i></button>
      <h1>腳掌抬起</h1>
    </div>
    <div class="ex-hero">
      <div class="ring-wrap"><div id="liftRing">${ringSVG(0)}</div><div class="ring-num" id="liftNum">${dur}</div></div>
      <div class="ex-title">${LIFT.title}</div>
      <div class="ex-badge" style="background:#f7e8e0;color:#b0522d;">${LIFT.badge}</div>
    </div>
    <div class="ex-img"><img id="liftImg" src="${LIFT_IMGS[step.img]}" alt="${step.title}"></div>
    <p class="ex-inst" id="liftInst"><strong>${step.title}</strong><br>${step.lines.join('<br>')}</p>
    <div class="ex-tip">${LIFT.tip}</div>
    <div class="lift-dur">
      <span>本動作時間</span>
      <button onclick="liftAdj(-10)">−</button>
      <b>${dur} 秒</b>
      <button onclick="liftAdj(10)">＋</button>
    </div>
    <div class="modal-btns">
      <button class="btn secondary" onclick="lRst()">重置</button>
      <button class="btn" id="liftStartBtn" style="background:#b0522d;" onclick="startLift()">開始計時（${dur} 秒）</button>
    </div>
  `;
}
function lRst(){ clearInterval(ltmr); lStep = 0; goto('exLift'); }
function updateLiftUI(i){
  const step = LIFT.steps[i]; if (!step) return;
  lStep = i;
  const img = document.getElementById('liftImg');
  const inst = document.getElementById('liftInst');
  if (img){ img.style.opacity='0'; img.src = LIFT_IMGS[step.img]; img.alt = step.title; setTimeout(()=>{ if(img) img.style.opacity='1'; }, 80); }
  if (inst) inst.innerHTML = '<strong>'+step.title+'</strong><br>'+step.lines.join('<br>');
}
function startLift(){
  spk(LIFT.spk.s);
  const btn = document.getElementById('liftStartBtn');
  if (btn){ btn.textContent = '進行中…'; btn.disabled = true; }
  updateLiftUI(0);
  setTimeout(()=>{ if(view==='exLift') runLiftTimer(); }, 1500);
}
function runLiftTimer(){
  const dur = getLiftDur();
  let rem = dur;
  const half = Math.floor(dur/2);
  let spoke1 = false, spoke2 = false;
  clearInterval(ltmr);
  ltmr = setInterval(()=>{
    rem--;
    const numEl = document.getElementById('liftNum');
    const ringEl = document.getElementById('liftRing');
    if (numEl) numEl.textContent = Math.max(rem,0);
    if (ringEl) ringEl.innerHTML = ringSVG(1 - rem/dur).match(/<svg[\s\S]*<\/svg>/)[0];
    if (!spoke1 && rem <= dur-2){ spoke1 = true; spk(LIFT.steps[0].spk); }
    if (!spoke2 && rem <= half){ spoke2 = true; updateLiftUI(1); spk(LIFT.steps[1].spk); }
    if (rem <= 0){
      clearInterval(ltmr);
      spk(LIFT.spk.e);
      dbPut('exerciseLogs', { id: uid(), date: new Date().toISOString().slice(0,10), module:'lift', label:'腳掌抬起' });
      setTimeout(()=>{ if(view==='exLift') goto('exercise'); }, 1500);
    }
  },1000);
}
function startGluteModule(){ gcur = 0; goto('exGlute'); }
function startLiftModule(){ lStep = 0; goto('exLift'); }

/* 自訂時間覆蓋（localStorage） */
function schedTimes(){ try{ return JSON.parse(localStorage.getItem('schedTimes')||'{}'); }catch(e){ return {}; } }
function schedSaveTime(tab, i, field, val){
  if (!val) return;
  const o = schedTimes();
  o[tab] = o[tab] || {}; o[tab][i] = o[tab][i] || {};
  o[tab][i][field] = val;
  try{ localStorage.setItem('schedTimes', JSON.stringify(o)); }catch(e){}
  render();
}
function schedResetTimes(){
  if (!confirm('恢復所有預設時間？')) return;
  try{ localStorage.removeItem('schedTimes'); }catch(e){}
  render();
}
function schedToMin(t){ const p = t.split(':'); return (+p[0])*60 + (+p[1]); }
/* 取得套用自訂時間後的清單 */
function getSched(tab){
  const ov = schedTimes()[tab] || {};
  return SCHED[tab].map((it,i)=>{
    const o = Object.assign({}, it, ov[i] || {});
    if (/^\d/.test(o.t)){
      const defDur = it.e - it.s;
      o.s = schedToMin(o.t);
      o.e = o.t2 ? schedToMin(o.t2) : o.s + defDur;
      if (o.e <= o.s) o.e = o.s + 1;
    }
    return o;
  });
}

/* 區間倒數計時 */
function schedFmt(sec){ return String(Math.floor(sec/60)).padStart(2,'0') + ':' + String(sec%60).padStart(2,'0'); }
function schedCdStop(silent){
  if (schedCd){ clearInterval(schedCd.tmr); schedCd = null; }
  if (!silent) render();
}
function schedCdToggle(i){
  if (schedCd && schedCd.tab === schedTab && schedCd.i === i){ schedCdStop(); return; }
  schedCdStop(true);
  const it = getSched(schedTab)[i];
  const total = Math.max(1, it.e - it.s) * 60;
  schedCd = {tab: schedTab, i: i, remain: total, tmr: null};
  spk('開始 ' + Math.round(total/60) + ' 分鐘倒數');
  schedCd.tmr = setInterval(schedCdTick, 1000);
  render();
}
function schedCdTick(){
  if (!schedCd) return;
  schedCd.remain--;
  if (schedCd.remain <= 0){
    clearInterval(schedCd.tmr); schedCd = null;
    spk('時間到，辛苦了');
    if (navigator.vibrate) navigator.vibrate([200,100,200]);
    if (view === 'exSched') render();
    return;
  }
  const el = document.getElementById('schedCdNum');
  if (el) el.textContent = schedFmt(schedCd.remain);
}
function schedExit(v){
  clearTimeout(schedTmr);
  schedCdStop(true);
  schedEdit = false;
  goto(v);
}

function scheduleHTML(){
  const d = new Date();
  const isWE = d.getDay() === 0 || d.getDay() === 6;
  if (schedTab === null) schedTab = isWE ? 'we' : 'wd';
  const isToday = schedTab === (isWE ? 'we' : 'wd');
  const nowMin = d.getHours()*60 + d.getMinutes();
  const list = getSched(schedTab);
  let nowIdx = -1, nextIdx = -1;
  if (isToday){
    list.forEach((it,i)=>{
      if (nowIdx < 0 && nowMin >= it.s && nowMin < it.e) nowIdx = i;
      if (nextIdx < 0 && /^\d/.test(it.t) && nowMin < it.s) nextIdx = i;
    });
    if (nowIdx >= 0) nextIdx = -1;
  }
  clearTimeout(schedTmr);
  schedTmr = setTimeout(()=>{ if (view==='exSched') render(); }, 60000);

  const rows = list.map((it,i)=>{
    const cls = i===nowIdx ? ' now' : '';

                : i===nextIdx ? '<span class="sched-badge next">接下來</span>' : '';
    const core = it.core ? `<div style="margin-top:6px;"><button class="btn secondary" style="padding:6px 12px;font-size:12px;" onclick="startWarmModule()">開始暖身 →</button></div>` : '';
    // 時間欄：編輯模式用 time input

    const tcol = (schedEdit && editable)
      ? `<input type="time" value="${it.t}" onchange="schedSaveTime('${schedTab}',${i},'t',this.value)">` +
        (it.t2 ? `<input type="time" value="${it.t2}" onchange="schedSaveTime('${schedTab}',${i},'t2',this.value)">` : '')
      : `${it.t}${it.t2?'<br>｜<br>'+it.t2:''}`;
    // 區間項目：倒數計時
    let cd = '';
    if (it.t2 && !schedEdit){
      const mine = schedCd && schedCd.tab === schedTab && schedCd.i === i;
      cd = mine
        ? `<div class="sched-cdrow"><span class="sched-cdnum" id="schedCdNum">${schedFmt(schedCd.remain)}</span><button class="cdbtn stop" onclick="schedCdToggle(${i})"><i class="ti ti-player-stop-filled"></i> 停止</button></div>`
        : `<button class="cdbtn" onclick="schedCdToggle(${i})"><i class="ti ti-player-play-filled"></i> ${it.e - it.s} 分鐘倒數</button>`;
    }

    ${schedEdit ? `<p style="font-size:12px;color:var(--td);background:var(--tl);border-radius:10px;padding:8px 12px;margin-bottom:1rem;">✏️ 編輯模式：直接點時間即可修改，改完按右上「✓」完成。</p>` : ''}
    <div class="sched-tabs">
      <button class="${schedTab==='wd'?'on':''}" onclick="schedCdStop(true);schedTab='wd';render()">平日（一～五）</button>
      <button class="${schedTab==='we'?'on':''}" onclick="schedCdStop(true);schedTab='we';render()">週末（六、日）</button>
    </div>
    ${rows}
    <details class="sched-core">
      <summary>🔄 15 分鐘核心暖身動作意象 <i class="ti ti-chevron-down" style="margin-left:auto;"></i></summary>
      <ul style="padding-left:1.1rem;margin:4px 0 0;">
        ${SCHED_CORE.map(c=>`<li><b>${c[0]}：</b>${c[1]}</li>`).join('')}
      </ul>
    </details>
    <p style="text-align:center;font-size:11px;color:var(--text3);margin-top:1rem;line-height:1.8;">
      時間表僅供參考，請依身體狀況與物理治療師建議調整。
    </p>
  `;
}

function ringSVG(pct, size){
  size = size || 150;
  const r = (size/2) - 10, c = 2*Math.PI*r;
  const off = c * (1 - pct);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}"/>
    <circle class="ring-fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

/* ---- Rehab ---- */
function getVal(id, key){
  if (custom[id] && custom[id][key] !== undefined) return custom[id][key];
  if (key === 'holdSec'){
    try{ const saved = localStorage.getItem('holdSec_'+id); if (saved!==null) return parseInt(saved); }catch(e){}
  }
  return DEFAULTS.find(e=>e.id===id)[key];
}
function isModified(id){
  const d = DEFAULTS.find(e=>e.id===id);
  if (!custom[id]) return false;
  return (custom[id].sets!==undefined && custom[id].sets!==d.sets) || (custom[id].holdSec!==undefined && custom[id].holdSec!==d.holdSec);
}
function updateChip(id, key, delta, min, max){
  if (!custom[id]) custom[id] = {};
  const newVal = Math.max(min, Math.min(max, getVal(id,key)+delta));
  custom[id][key] = newVal;
  if (key==='holdSec'){ try{ localStorage.setItem('holdSec_'+id, newVal); }catch(e){} }
  goto('exRehab');
}
function rehabHTML(){
  const ex = DEFAULTS[rcur];

      <div class="chip"><div class="l">維持秒數</div><div class="v">${holdSec}s</div><div class="chip-adj"><button onclick="updateChip('${ex.id}','holdSec',-2,4,30)">－</button><button onclick="updateChip('${ex.id}','holdSec',2,4,30)">＋</button></div></div>
      <div class="chip"><div class="l">已完成</div><div class="v">${done}/${sets}</div></div>
    </div>

      <button class="btn secondary" onclick="cS[ex.id]=0;goto('exRehab')">重設</button>
      <button class="btn" id="rehabStartBtn" onclick="startEx()">開始這組</button>
    </div>
  `;
}
function startEx(){
  const ex = DEFAULTS[rcur];
  spk(ex.vc.s);
  setTimeout(()=>runSet(ex.id, ex, (cS[ex.id]||0)+1), 1000);
}
function runSet(id, ex, n){
  const holdSec = getVal(id,'holdSec');
  let rem = holdSec;
  clearInterval(tmr);
  tmr = setInterval(()=>{
    rem--;
    const numEl = document.getElementById('rehabNum'); const ringEl = document.getElementById('rehabRing');
    if (numEl) numEl.textContent = Math.max(rem,0);
    if (ringEl) ringEl.innerHTML = ringSVG(1-rem/holdSec).match(/<svg[\s\S]*<\/svg>/)[0];
    if (rem <= 0){
      clearInterval(tmr);
      cS[id] = n; totS++;
      const sets = getVal(id,'sets');
      if (cS[id] >= sets){ mkDone(); }
      else { spk(ex.vc.e); runRest(id, ex, n+1, ex.restSec); }
    }
  },1000);
}
function runRest(id, ex, nxt, rs){
  let rem = rs;
  clearInterval(tmr);
  goto('exRehab');
  const label = document.getElementById('rehabNum');
  tmr = setInterval(()=>{
    rem--;
    if (label) label.textContent = rem>0? '休息 '+rem : '開始';
    if (rem <= 0){ clearInterval(tmr); runSet(id, ex, nxt); }
  },1000);
}
function mkDone(){
  const ex = DEFAULTS[rcur];
  dbPut('exerciseLogs', { id: uid(), date: new Date().toISOString().slice(0,10), module:'rehab', label: ex.title, sets: cS[ex.id] });
  if (!isModified(ex.id) && rcur < DEFAULTS.length - 1){
    let rem = 15;
    goto('exRehab');
    const numEl = document.getElementById('rehabNum');
    tmr = setInterval(()=>{
      rem--;
      if (numEl) numEl.textContent = rem>0 ? rem+'s 後下一項' : '';
      if (rem<=0){ clearInterval(tmr); rcur++; goto('exRehab'); }
    },1000);
  } else if (rcur < DEFAULTS.length - 1){
    goto('exRehab');
  } else {
    goto('exercise');
  }
}

const GEMINI_MODEL_CANDIDATES = ['gemini-2.5-flash','gemini-2.0-flash','gemini-1.5-flash','gemini-1.5-flash-8b','gemini-1.5-pro','gemini-1.0-pro','gemini-pro'];
const OPENAI_MODEL = 'gpt-4o-mini';

async function buildContextText(){
  const timeline = (await dbGetAll('timeline')).sort((a,b)=>a.date.localeCompare(b.date));
  const symptomLogs = (await dbGetAll('symptomLogs')).sort((a,b)=>a.date.localeCompare(b.date));
  const gaitLogs = (await dbGetAll('gaitLogs')).sort((a,b)=>a.date.localeCompare(b.date));
  const exLogs = (await dbGetAll('exerciseLogs')).sort((a,b)=>a.date.localeCompare(b.date));
  const caseNotes = (await dbGetAll('caseNotes')).sort((a,b)=>a.date.localeCompare(b.date));

  const tlText = timeline.map(t => `- ${t.date}［${TL_TYPES[t.type]?.label||t.type}］${t.title}${t.hospital?'（'+t.hospital+'）':''}：${t.desc||''}${t.historyDesc? '｜病史描述：'+t.historyDesc : ''}${t.doctorConclusion? '｜醫師結論：'+t.doctorConclusion : ''}`).join('\n');
  const symText = symptomLogs.slice(-30).map(l => `- ${l.date}${l.time?' '+l.time:''} 背屈肌力${l.dorsiStrength}/5，麻木「${l.numbnessArea||'無'}」嚴重度${l.numbnessSeverity}/10，足底筋膜：${(l.plantarFascia&&l.plantarFascia.length)?l.plantarFascia.map(k=>(FASCIA_ZONES.find(z=>z.k===k)||{}).l||k).join('、'):'無'}${l.note?'，備註：'+l.note:''}`).join('\n');
  const gaitText = gaitLogs.slice(-30).map(l => `- ${l.date}${l.usedAFO?'（有使用AFO／護具）':''}：${l.note||''}`).join('\n');
  const exText = `近期復健運動完成次數：${exLogs.length} 次`;
  const csText = caseNotes.map(n => `- ${n.date}：${n.text}`).join('\n');

  return `【病例簡述／病史背景】\n${csText||'（無資料）'}\n\n【病歷時間軸】\n${tlText||'（無資料）'}\n\n【症狀日誌】\n${symText||'（無資料）'}\n\n【步態與功能】\n${gaitText||'（無資料）'}\n\n【運動紀錄】\n${exText}`;
}
async function callGeminiAuto(prompt){
  const key = settings.geminiKey;
  const ordered = settings.geminiWorkingModel
    ? [settings.geminiWorkingModel, ...GEMINI_MODEL_CANDIDATES.filter(m=>m!==settings.geminiWorkingModel)]
    : GEMINI_MODEL_CANDIDATES;
  let lastErr = null;
  for (const model of ordered){
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}] })
    });
    const data = await resp.json().catch(()=>({}));
    if (resp.ok){
      if (settings.geminiWorkingModel !== model) saveSetting('geminiWorkingModel', model);
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }
    const msg = data.error?.message || resp.statusText;
    lastErr = new Error(msg);
    const isModelIssue = resp.status === 404 || /not found|not supported|does not exist/i.test(msg);
    if (!isModelIssue) throw lastErr; // 金鑰錯誤／額度用盡等其他問題，直接中止不用再試其他版本
  }
  throw lastErr || new Error('所有 Gemini 模型版本皆嘗試失敗');
}
async function callAI(prompt){
  const ai = getActiveAI();
  if (ai === 'gemini'){
    return await callGeminiAuto(prompt);
  } else {
    const resp = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${settings.openaiKey}`},
      body: JSON.stringify({ model: OPENAI_MODEL, messages:[{role:'user',content:prompt}], max_tokens:900, temperature:0.4 })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || resp.statusText);
    return data.choices?.[0]?.message?.content || '';
  }
}
const AI_SAFETY_INSTRUCTION = `你是一位協助整理個人復健紀錄的助理，服務對象正在恢復右側垂足（腓總神經損傷術後＋肌腱轉位），同時有腰椎椎間盤突出手術病史。

- 若使用者的紀錄顯示某些變化「可能」值得跟醫師討論，只能用「建議與您的醫師討論」的措辭，不能給出像是「這代表你的神經沒有恢復」這類確定性判斷。
- 不要建議是否需要再次手術、換藥、或停止復健運動，這些屬於醫療決策。
- 語氣專業、清楚、有條理，繁體中文。`;
async function runTrendSummary(){
  const out = document.getElementById('aiOutput');
  out.innerHTML = '<p class="ai-thinking">正在整理趨勢，請稍候…</p>';
  try{
    const ctx = await buildContextText();

      <div class="card-title"><i class="ti ti-sparkles"></i>AI 引擎（擇一設定即可）</div>

        <div class="modal-btns" style="margin-top:8px;">
          <button class="btn" onclick="saveKeyField('geminiKey')">儲存</button>
          <button class="btn secondary" onclick="clearKeyField('geminiKey')">清除</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">OpenAI API Key ${settings.openaiKey?'<span style="color:var(--teal);">✓ 已設定</span>':''}</label>
        <input type="password" class="form-input" id="openaiKey" placeholder="貼上 OpenAI API Key" autocomplete="off">
        <div class="modal-btns" style="margin-top:8px;">
          <button class="btn" onclick="saveKeyField('openaiKey')">儲存</button>
          <button class="btn secondary" onclick="clearKeyField('openaiKey')">清除</button>
        </div>
      </div>
      <p style="font-size:11px;color:var(--text3);">目前使用：${ai ? (ai==='gemini'?'Gemini':'OpenAI') : '尚未設定'}。金鑰只保存在本機，不會同步到雲端。</p>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-cloud"></i>雲端同步（Firebase，選用）</div>
      ${!settings.fbConfig ? `
        <div class="form-group">
          <label class="form-label">Firebase 設定（JSON）</label>
          <textarea class="form-input" id="fbConfigInput" rows="5" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","storageBucket":"..."}'></textarea>
          <button class="btn" style="margin-top:8px;" onclick="saveFbConfig()">儲存 Firebase 設定</button>
        </div>
      ` : cloudOn ? `
        <p style="font-size:13px;color:var(--text2);">已登入：<strong>${fbUser?escapeHtml(fbUser.email||''):''}</strong></p>
        <div class="modal-btns" style="margin-top:10px;">
          <button class="btn" onclick="doCloudPush()">⬆ 上傳本機資料</button>
          <button class="btn secondary" onclick="doCloudPull()">⬇ 下載雲端資料</button>
        </div>
        <button class="btn secondary" style="margin-top:8px;width:100%;" onclick="doFbSignOut()">登出雲端</button>
        <button class="btn secondary" style="margin-top:8px;width:100%;" onclick="clearFbConfig()">移除 Firebase 設定</button>
      ` : `
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="fbEmail" autocomplete="off"></div>

      <p style="font-size:11px;color:var(--text3);margin-top:4px;">API Key 與密碼雜湊等敏感設定僅存本機，永遠不會同步到雲端。</p>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-shield-lock"></i>安全性</div>
      <div class="form-group">
        <label class="form-label">變更密碼（至少 4 碼）</label>
        <input type="password" class="form-input" id="newPw" placeholder="輸入新密碼" autocomplete="off">

async function saveKeyField(key){
  const el = document.getElementById(key);
  if (!el || !el.value.trim()){ return; }
  await saveSetting(key, el.value.trim());
  if (key === 'geminiKey') await saveSetting('geminiWorkingModel', '');
  render();
}
async function clearKeyField(key){
  await saveSetting(key, '');
  if (key === 'geminiKey') await saveSetting('geminiWorkingModel', '');
  render();
}
async function saveFbConfig(){
  const el = document.getElementById('fbConfigInput');
  const msg = document.getElementById('cloudMsg');
  try{
    const cfg = JSON.parse(el.value);
    if (!cfg.apiKey || !cfg.projectId) throw new Error('缺少 apiKey 或 projectId');
    await saveSetting('fbConfig', cfg);
    initFirebase();
    render();
  }catch(e){ if (msg) msg.textContent = '設定格式錯誤：' + (e.message||e); }
}
async function clearFbConfig(){
  if (!confirm('移除 Firebase 設定？（本機資料不受影響）')) return;
  try{ await fbSignOut(); }catch(e){}
  await saveSetting('fbConfig', '');
  fbApp = null; fbAuth = null; fbDb = null; fbStorage = null; fbUser = null;
  render();
}
async function doFbSignIn(){
  const msg = document.getElementById('cloudMsg');
  try{
    await fbSignIn(document.getElementById('fbEmail').value.trim(), document.getElementById('fbPw').value);
    render();
  }catch(e){ if (msg) msg.textContent = '登入失敗：' + (e.message||e); }
}
async function doFbSignUp(){
  const msg = document.getElementById('cloudMsg');
  try{
    await fbSignUp(document.getElementById('fbEmail').value.trim(), document.getElementById('fbPw').value);
    render();
  }catch(e){ if (msg) msg.textContent = '註冊失敗：' + (e.message||e); }
}
async function doFbSignOut(){ try{ await fbSignOut(); }catch(e){} render(); }
async function doCloudPush(){
  const msg = document.getElementById('cloudMsg');
  if (msg) msg.textContent = '上傳中，請稍候…';
  try{
    const n = await cloudPushAllLocal();
    if (msg) msg.textContent = '✓ 已上傳 ' + n + ' 筆資料到雲端';
  }catch(e){ if (msg) msg.textContent = '上傳失敗：' + (e.message||e); }
}
async function doCloudPull(){
  const msg = document.getElementById('cloudMsg');
  if (msg) msg.textContent = '下載中，請稍候…';
  try{
    const n = await cloudPullAll();
    if (msg) msg.textContent = '✓ 已從雲端下載 ' + n + ' 筆資料';
  }catch(e){ if (msg) msg.textContent = '下載失敗：' + (e.message||e); }
}
async function changePassword(){
  const el = document.getElementById('newPw');
  const msg = document.getElementById('pwMsg');
  if (!el || el.value.length < 4){ if (msg) msg.textContent = '密碼至少 4 碼'; return; }
  const hash = await sha256(el.value);
  await saveSetting('pwHash', hash);
  el.value = '';
  if (msg) msg.textContent = '✓ 密碼已更新';
}
async function exportAllData(){
  const msg = document.getElementById('dataMsg');
  try{
    const dump = {};
    for (const s of STORES){ dump[s] = await dbGetAll(s); }
    if (dump.kv) dump.kv = dump.kv.filter(r => !['pwHash','geminiKey','openaiKey'].includes(r.id));
    const blob = new Blob([JSON.stringify(dump)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'footlift-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    if (msg) msg.textContent = '✓ 已匯出（不含密碼與 API Key）';
  }catch(e){ if (msg) msg.textContent = '匯出失敗：' + (e.message||e); }
}
async function importAllData(ev){
  const msg = document.getElementById('dataMsg');
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  try{
    const text = await file.text();
    const dump = JSON.parse(text);
    let n = 0;
    for (const s of STORES){
      if (!Array.isArray(dump[s])) continue;
      for (const row of dump[s]){
        if (s === 'kv' && ['pwHash','geminiKey','openaiKey'].includes(row.id)) continue;
        await dbPut(s, row, { skipCloud:true }); n++;
      }
    }
    await loadSettings();
    if (msg) msg.textContent = '✓ 已匯入 ' + n + ' 筆資料';
    setTimeout(render, 800);
  }catch(e){ if (msg) msg.textContent = '匯入失敗：' + (e.message||e); }
}
